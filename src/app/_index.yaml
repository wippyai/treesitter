version: "1.0"
namespace: app

entries:
  - name: assert
    kind: library.lua
    meta:
      comment: Assertion primitives for the migrated tree-sitter parity tests.
    source: file://assert.lua

  - name: procs
    kind: process.host
    meta:
      comment: Process host running concurrent benchmark workers.
    host:
      max_processes: 64
      workers: 8
    lifecycle:
      auto_start: true

  - name: bench_worker
    kind: process.lua
    meta:
      comment: Concurrent benchmark worker; runs N stateless extracts against the pooled engine.
    source: file://bench_worker.lua
    method: run
    modules:
      - funcs
      - json

  - name: bench
    kind: process.lua
    meta:
      comment: Parse/walk/query throughput benchmark across source sizes.
    source: file://bench.lua
    method: run
    modules:
      - time
      - funcs
      - json
    imports:
      treesitter: treesitter:treesitter

  - name: smoke_test
    kind: function.lua
    meta:
      type: test
      suite: treesitter.smoke
      description: End-to-end parse of every supported language through the resident WASM engine.
    source: file://smoke_test.lua
    method: run
    imports:
      test: wippy.test:test
      treesitter: treesitter:treesitter

  - name: errors
    kind: function.lua
    meta:
      type: test
      suite: treesitter
      description: Tree-sitter error handling
    source: file://errors.lua
    method: main
    imports:
      assert_primitives: app:assert
      treesitter: treesitter:treesitter

  - name: resources
    kind: function.lua
    meta:
      type: test
      suite: treesitter
      description: Tree-sitter resource management and cleanup
    source: file://resources.lua
    method: main
    imports:
      assert_primitives: app:assert
      treesitter: treesitter:treesitter

  - name: lang_go
    kind: function.lua
    meta:
      type: test
      suite: treesitter
      description: Tree-sitter Go language support
    source: file://lang_go.lua
    method: main
    imports:
      assert_primitives: app:assert
      treesitter: treesitter:treesitter

  - name: lang_javascript
    kind: function.lua
    meta:
      type: test
      suite: treesitter
      description: Tree-sitter JavaScript language support
    source: file://lang_javascript.lua
    method: main
    imports:
      assert_primitives: app:assert
      treesitter: treesitter:treesitter

  - name: lang_typescript
